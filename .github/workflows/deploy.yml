name: Build Monorepo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build client + server
        run: npm run build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist
            client/dist

      # Extend here if you want provider-specific deploy steps.
      # Examples:
      # - Netlify CLI deploy command
      # - Railway CLI deploy command
      # - Vercel CLI deploy command
